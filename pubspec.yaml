name: namaadhu_app
description: Prayer times app for the Maldives.

publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_riverpod: ^3.2.1
  csv: ^6.0.0
  shared_preferences: ^2.0.15
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  ionicons: ^0.2.1
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^21.0.0-dev.2
  timezone: ^0.11.0
  go_router: ^17.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.3.3
  freezed: ^3.2.5
  json_serializable: ^6.5.4
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/csv/
    - assets/csv/islands/

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
